name: Publish to npm

# Publishes to npm via OIDC Trusted Publishing (no NPM token needed) whenever a
# GitHub Release is published. Provenance is attached automatically. Required by
# n8n's verified-node program. Configure the trusted publisher on npmjs.com:
# package settings -> Trusted Publisher -> GitHub Actions, repo
# keenableai/n8n-nodes-keenable, workflow file publish.yml.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC for npm Trusted Publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # Trusted Publishing needs npm >= 11.5.1
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      # OIDC Trusted Publishing: no NODE_AUTH_TOKEN; provenance is automatic.
      - run: npm publish --access public
