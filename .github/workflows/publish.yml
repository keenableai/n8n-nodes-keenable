name: Publish to npm

# Publishes to npm via OIDC Trusted Publishing (no NPM token) on a published
# Release, or manually via workflow_dispatch. Provenance is attached
# automatically. Configure the trusted publisher on npmjs.com (package settings
# -> Trusted Publisher): GitHub Actions, repo keenableai/n8n-nodes-keenable,
# workflow filename `publish.yml`.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC for npm Trusted Publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      # Trusted Publishing (OIDC) requires npm >= 11.5.1.
      - run: npm install -g npm@latest
      - run: npm --version
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      # No NODE_AUTH_TOKEN: npm authenticates via OIDC and attaches provenance.
      - run: npm publish --access public
